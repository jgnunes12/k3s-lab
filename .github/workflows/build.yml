name: build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/k3s-lab:v1.15 .

    - name: Login DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/k3s-lab:v1.15
